<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 智能文档生成器 v5</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Docx.js -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased overflow-hidden relative selection:bg-blue-500/30">

    <!-- 动态背景 (保持柔和) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-blue-600/20 rounded-full mix-blend-screen filter blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] purple-600/20 rounded-full mix-blend-screen filter blur-[120px] animate-blob animation-delay-2000"></div>
        <div class="absolute top-[40%] left-[40%] w-[500px] h-[500px] pink-600/10 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000"></div>
        
        <!-- 用户壁纸层 -->
        <img id="userBackgroundImage" class="absolute inset-0 w-full h-full object-cover opacity-20 hidden transition-opacity duration-500" alt="User BG">
        <video id="userBackgroundVideo" class="absolute inset-0 w-full h-full object-cover opacity-20 hidden transition-opacity duration-500" muted loop autoplay></video>
    </div>

    <div class="relative z-10 flex h-screen max-h-screen gap-0">
        
        <!-- 左侧配置面板 (极简风格) -->
        <aside class="w-[450px] flex-shrink-0 bg-slate-900/80 backdrop-blur-xl border-r border-white/5 flex flex-col shadow-2xl transition-all duration-300" id="sidebar">
            
            <!-- 顶部导航 -->
            <header class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-slate-900/50">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i class="fa-solid fa-wand-magic-sparkles text-white text-sm"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight text-white">DocGen AI</h1>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">v5.0 Minimalist</p>
                    </div>
                </div>
                <button onclick="toggleHistory()" class="text-slate-400 hover:text-white p-2 rounded-full hover:bg-white/5 transition">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
            </header>

            <!-- 滚动内容区 -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                
                <!-- 1. 个性化设置 (折叠式/紧凑) -->
                <section class="space-y-3">
                    <div class="flex items-center gap-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                        <i class="fa-solid fa-palette"></i> 外观主题
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setWallpaper('default')" class="aspect-square rounded-lg bg-slate-800 border border-white/10 hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition group relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-br from-blue-500 to-purple-600 opacity-0 group-hover:opacity-20"></div>
                            <i class="fa-solid fa-cloud text-slate-400 group-hover:text-white transition"></i>
                        </button>
                        <button onclick="document.getElementById('imageUpload').click()" class="aspect-square rounded-lg bg-slate-800 border border-white/10 hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition group">
                            <i class="fa-solid fa-image text-slate-400 group-hover:text-white transition"></i>
                        </button>
                        <button onclick="document.getElementById('videoUpload').click()" class="aspect-square rounded-lg bg-slate-800 border border-white/10 hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition group">
                            <i class="fa-solid fa-video text-slate-400 group-hover:text-white transition"></i>
                        </button>
                        <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                        <input type="file" id="videoUpload" accept="video/*" class="hidden" onchange="handleVideoUpload(this)">
                    </div>
                    
                    <div class="flex gap-2 mt-2">
                        <button onclick="setThemeColor('blue')" class="flex-1 h-8 rounded-md bg-blue-600 hover:bg-blue-500 transition ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent focus:ring-blue-500"></button>
                        <button onclick="setThemeColor('emerald')" class="flex-1 h-8 rounded-md bg-emerald-600 hover:bg-emerald-500 transition ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent focus:ring-emerald-500"></button>
                        <button onclick="setThemeColor('purple')" class="flex-1 h-8 rounded-md bg-purple-600 hover:bg-purple-500 transition ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent focus:ring-purple-500"></button>
                        <button onclick="setThemeColor('orange')" class="flex-1 h-8 rounded-md bg-orange-600 hover:bg-orange-500 transition ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent focus:ring-orange-500"></button>
                    </div>
                </section>

                <hr class="border-white/5">

                <!-- 2. AI 配置 -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <i class="fa-solid fa-robot"></i> AI 模型
                    </div>
                    <div class="space-y-3">
                        <div class="relative">
                            <i class="fa-solid fa-key absolute left-3 top-3 text-slate-500 text-sm"></i>
                            <input type="password" id="apiKey" placeholder="sk-..." 
                                   class="w-full bg-slate-800/50 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="modelProvider" onchange="updateModelOptions()" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer">
                                <option value="deepseek">DeepSeek</option>
                                <option value="qwen">通义千问</option>
                                <option value="kimi">Kimi</option>
                                <option value="glm">智谱 AI</option>
                                <option value="ollama">Ollama</option>
                                <option value="custom">自定义</option>
                            </select>
                            <select id="modelSelect" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer">
                                <!-- JS 填充 -->
                            </select>
                        </div>
                        <div id="customUrlContainer" class="hidden">
                            <input type="url" id="customApiUrl" placeholder="API URL" 
                                   class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        </div>
                    </div>
                </section>

                <hr class="border-white/5">

                <!-- 3. 基础信息 -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <i class="fa-solid fa-book-open"></i> 课程信息
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <input type="text" id="courseName" placeholder="课程名称 (必填)" 
                                   class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        </div>
                        <input type="text" id="major" placeholder="专业方向" class="bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        <input type="text" id="audience" placeholder="授课对象" class="bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                        <input type="number" id="hours" placeholder="课时数" class="bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>
                </section>

                <hr class="border-white/5">

                <!-- 4. 教学目标 -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <i class="fa-solid fa-bullseye"></i> 核心目标
                    </div>
                    <textarea id="taskDesc" rows="3" placeholder="描述课程核心任务与预期成果..." 
                              class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"></textarea>
                    <input type="text" id="assessment" placeholder="考核方式" 
                           class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                </section>

                <hr class="border-white/5">

                <!-- 5. 输出设置 (核心改进) -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <i class="fa-solid fa-file-export"></i> 输出定制
                    </div>
                    
                    <div>
                        <label class="block text-xs text-slate-400 mb-1.5 ml-1">文档类型 (自定义)</label>
                        <input type="text" id="docType" placeholder="例如：教学大纲 / PPT 脚本 / 实验指导书" 
                               class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs text-slate-400 ml-1">详细程度</label>
                            <span id="detailLabel" class="text-xs text-blue-400 font-medium">标准 (3000字)</span>
                        </div>
                        <input type="range" id="minWordCount" min="500" max="10000" step="100" value="3000" 
                               class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        <div class="flex justify-between mt-1 text-[10px] text-slate-500 px-1">
                            <span>精简</span>
                            <span>标准</span>
                            <span>详尽</span>
                        </div>
                    </div>
                </section>

            </div>

            <!-- 底部操作区 -->
            <div class="p-5 border-t border-white/5 bg-slate-900/50 space-y-3">
                <button id="generateBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/25 transition-all transform active:scale-[0.98] flex justify-center items-center gap-2 group">
                    <i class="fa-solid fa-bolt group-hover:rotate-12 transition-transform"></i>
                    <span>生成文档</span>
                </button>
                
                <div class="flex gap-2">
                    <button id="exportConfigBtn" class="flex-1 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-medium transition border border-white/5 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> 导出配置
                    </button>
                    <label class="flex-1 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-medium transition border border-white/5 flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-upload"></i> 导入配置
                        <input type="file" id="importConfigInput" accept=".json" class="hidden" onchange="importConfig(this)">
                    </label>
                </div>
                
                <div class="flex items-center justify-between text-[10px] text-slate-500 pt-1">
                    <span id="statusText" class="truncate">就绪</span>
                    <span id="wordCount" class="opacity-0 transition-opacity">0 字</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-1 overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区 -->
        <main class="flex-1 flex flex-col h-full relative bg-slate-900/30 backdrop-blur-sm">
            <header class="h-14 border-b border-white/5 bg-slate-900/50 flex items-center justify-between px-6">
                <h2 class="text-sm font-semibold text-slate-300"><i class="fa-solid fa-eye mr-2 text-blue-400"></i>实时预览</h2>
                <div class="flex gap-2">
                    <button id="copyBtn" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-md text-xs font-medium transition border border-white/5">
                        <i class="fa-regular fa-copy mr-1"></i> 复制
                    </button>
                    <button id="saveDocBtn" class="px-3 py-1.5 bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 rounded-md text-xs font-medium transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa-solid fa-file-word mr-1"></i> 下载 Word
                    </button>
                </div>
            </header>
            <div class="flex-1 p-8 overflow-hidden relative">
                <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm"></div>
                <div class="relative z-10 h-full flex flex-col">
                    <div class="bg-slate-800/40 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl flex-1 overflow-hidden flex flex-col">
                        <div class="flex-1 overflow-y-auto custom-scrollbar prose prose-invert prose-lg max-w-none p-8" id="previewArea">
                            <div class="flex flex-col items-center justify-center h-full text-slate-500 opacity-40">
                                <i class="fa-solid fa-robot text-5xl mb-4"></i>
                                <p class="text-sm">等待指令...</p>
                            </div>
                        </div>
                        <div class="border-t border-white/5 bg-slate-900/50 p-2 px-4 flex justify-between items-center text-[10px] text-slate-500">
                            <span id="timeStamp">-</span>
                            <span><i class="fa-solid fa-check-circle text-green-500 mr-1"></i> Markdown Ready</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 历史弹窗 -->
    <div id="historyModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeHistory()"></div>
        <div class="absolute right-0 top-0 h-full w-[400px] bg-slate-900 border-l border-white/10 shadow-2xl p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-base font-bold text-white">🕒 历史记录</h3>
                <button onclick="clearHistory()" class="text-xs text-red-400 hover:text-red-300">清空</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
